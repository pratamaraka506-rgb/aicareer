<!DOCTYPE html>
<html lang="id">
<head>
  <title>AI Career OS</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="https://github.com/pratamaraka506-rgb/aicareer/raw/main/AICAREER-RADEN.png">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ font-family:Arial,sans-serif; overflow:hidden; background:#020812; }

    .topbar{
      width:100%; height:60px; background:#000;
      display:flex; align-items:center; padding:0 20px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:relative; z-index:10;
    }
    .topbar img{ height:38px; margin-right:12px; }
    .topbar h1{ color:#fff; font-size:18px; font-weight:700; }

    iframe{
      width:100%; height:calc(100vh - 60px);
      border:none; display:block; background:#020812;
    }

    /* WRAPPER LOADING */
    #wrapperLoader{
      position:fixed; top:60px; left:0; right:0; bottom:0;
      background:#020812; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px; z-index:5;
      transition:opacity 0.4s ease;
    }
    #wrapperLoader.hidden{ opacity:0; pointer-events:none; }
    .wl-logo{
      font-size:24px; font-weight:800; color:#ff7a00;
      display:flex; align-items:center; gap:10px;
    }
    .wl-logo-icon{
      width:42px; height:42px;
      background:linear-gradient(135deg,#ff7a00,#ff3d00);
      border-radius:12px; display:grid; place-items:center;
      font-size:20px; color:white;
    }
    .wl-spin{
      width:18px; height:18px;
      border:2px solid rgba(255,255,255,0.15);
      border-top-color:#ff7a00; border-radius:50%;
      animation:wlSpin 0.8s linear infinite;
    }
    .wl-status{
      display:flex; align-items:center; gap:10px;
      color:rgba(238,242,255,0.6); font-size:13px;
    }
    .wl-error{
      display:none; flex-direction:column; align-items:center;
      gap:14px; max-width:380px; text-align:center; padding:0 20px;
    }
    .wl-error.show{ display:flex; }
    .wl-error-icon{ font-size:42px; }
    .wl-error-title{ font-size:18px; font-weight:700; color:#ff4d6d; }
    .wl-error-msg{ font-size:13px; color:rgba(238,242,255,0.6); line-height:1.6; }
    .wl-btn-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:6px; }
    .wl-btn{
      display:inline-flex; align-items:center; gap:6px;
      padding:10px 18px; border-radius:12px; border:none;
      font-size:13px; font-weight:700; font-family:inherit; cursor:pointer;
    }
    .wl-btn-primary{
      background:linear-gradient(135deg,#ff7a00,#ff3d00);
      color:white; box-shadow:0 4px 16px rgba(255,122,0,0.3);
    }
    .wl-btn-secondary{
      background:rgba(255,255,255,0.06);
      color:rgba(238,242,255,0.85);
      border:1px solid rgba(255,255,255,0.12);
    }

    @keyframes wlSpin{ to{ transform:rotate(360deg); } }

    /* TOAST */
    .toast{
      position:fixed; top:80px; right:20px; min-width:280px;
      padding:16px 20px; border-radius:14px; color:#fff;
      font-size:14px; font-weight:600; z-index:9999;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
      animation:slideIn .4s ease;
    }
    .toast.success{ background:linear-gradient(135deg,#00c853,#009624); }
    .toast.failed{ background:linear-gradient(135deg,#ff1744,#d50000); }
    .toast.pending{ background:linear-gradient(135deg,#ff9800,#ef6c00); }
    @keyframes slideIn{
      from{ opacity:0; transform:translateX(100%); }
      to{ opacity:1; transform:translateX(0); }
    }

    @media (max-width:600px){
      .wl-btn-row{ flex-direction:column; width:100%; }
      .wl-btn{ width:100%; justify-content:center; }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <img src="https://github.com/pratamaraka506-rgb/aicareer/raw/main/AICAREER-RADEN.png" alt="AI Career OS">
    <h1>AI Career OS</h1>
  </div>

  <!-- WRAPPER LOADING -->
  <div id="wrapperLoader">
    <div class="wl-logo">
      <div class="wl-logo-icon">&#x26A1;</div>
      AI Career OS
    </div>
    <div class="wl-status" id="wlStatus">
      <div class="wl-spin"></div>
      <span id="wlStatusText">Memuat platform...</span>
    </div>
    <div class="wl-error" id="wlError">
      <div class="wl-error-icon">&#x26A0;&#xFE0F;</div>
      <div class="wl-error-title">Gagal Memuat Platform</div>
      <div class="wl-error-msg" id="wlErrorMsg">
        Koneksi terlalu lambat atau ada masalah dengan server.
      </div>
      <div class="wl-btn-row">
        <button class="wl-btn wl-btn-primary" onclick="retryLoad()">&#x1F504; Retry</button>
        <button class="wl-btn wl-btn-secondary" onclick="window.location.reload()">&#x1F501; Refresh</button>
      </div>
    </div>
  </div>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbxp_GycjML4Nl7j10jdx6DZQqojoT3kz4EtUXCzq_vSVOfX_PJCs5L6801fuBzvNZpJ_w/exec">
  </iframe>

  <script>
    /* ============================================================
       WRAPPER LOADING + TIMEOUT + RETRY
       ============================================================ */
    var WS = {
      startedAt: Date.now(),
      hidden: false,
      hardTimeoutMs: 4500,
      softTimeoutMs: 8000,
      hardTimer: null,
      softTimer: null,
      retryCount: 0,
      maxRetries: 2
    };

    function hideWrapperLoader() {
      if (WS.hidden) return;
      WS.hidden = true;
      if (WS.hardTimer) clearTimeout(WS.hardTimer);
      if (WS.softTimer) clearTimeout(WS.softTimer);
      var loader = document.getElementById('wrapperLoader');
      if (!loader) return;
      loader.classList.add('hidden');
      setTimeout(function() { loader.style.display = 'none'; }, 420);
    }

    function showWrapperError(msg) {
      var statusEl = document.getElementById('wlStatus');
      var errorEl  = document.getElementById('wlError');
      var msgEl    = document.getElementById('wlErrorMsg');
      if (statusEl) statusEl.style.display = 'none';
      if (errorEl)  errorEl.classList.add('show');
      if (msgEl && msg) msgEl.textContent = msg;
    }

    function retryLoad() {
      WS.retryCount++;
      if (WS.retryCount > WS.maxRetries) {
        window.location.reload();
        return;
      }
      WS.startedAt = Date.now();
      WS.hidden = false;
      var loader   = document.getElementById('wrapperLoader');
      var statusEl = document.getElementById('wlStatus');
      var errorEl  = document.getElementById('wlError');
      if (loader)   { loader.style.display = 'flex'; loader.classList.remove('hidden'); }
      if (statusEl) statusEl.style.display = 'flex';
      if (errorEl)  errorEl.classList.remove('show');

      var frame = document.getElementById('appFrame');
      if (frame) {
        var src = frame.src;
        frame.src = 'about:blank';
        setTimeout(function() {
          frame.src = src;
          startWrapperTimers();
        }, 200);
      }
    }

    function startWrapperTimers() {
      WS.hardTimer = setTimeout(function() {
        if (!WS.hidden) hideWrapperLoader();
      }, WS.hardTimeoutMs);

      WS.softTimer = setTimeout(function() {
        if (!WS.hidden) showWrapperError('Loading terlalu lama. Klik Retry atau Refresh.');
      }, WS.softTimeoutMs);
    }

    // Iframe event handlers
    var iframe = document.getElementById('appFrame');
    if (iframe) {
      iframe.addEventListener('load', function() {
        setTimeout(hideWrapperLoader, 600);
      });
      iframe.addEventListener('error', function() {
        showWrapperError('Tidak dapat memuat. Periksa koneksi internet.');
      });
    }

    // Start timers
    startWrapperTimers();

    // Global error handler
    window.onerror = function(msg, url, line) {
      console.error('[WRAPPER]', msg, url, line);
      return false;
    };

    /* ============================================================
       PAYMENT TOAST
       ============================================================ */
    function showToast(message, type) {
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.innerHTML = message;
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 5000);
    }

    var params  = new URLSearchParams(window.location.search);
    var payment = params.get('payment');
    if (payment === 'success') showToast('&#x2705; Pembayaran berhasil! Premium diaktifkan.', 'success');
    if (payment === 'failed')  showToast('&#x274C; Pembayaran gagal atau dibatalkan.', 'failed');
    if (payment === 'pending') showToast('&#x23F3; Menunggu pembayaran selesai.', 'pending');
  </script>

</body>
</html>
