<!DOCTYPE html>
<html>
<head>
<title>AI Career OS</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
}

.logo{
    position:fixed;
    top:24px;
    left:24px;
    z-index:9999;
    pointer-events:none;
    padding:8px 10px;
    border-radius:14px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(6px);
}

.logo img{
    width:120px;
    height:auto;
    object-fit:contain;
    display:block;
}
}
</style>

</head>

<body>

<div class="logo">
<img src="https://raw.githubusercontent.com/pratamaraka506-rgb/aicareer/main/AICAREER-RADEN.png">
